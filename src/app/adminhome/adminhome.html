<div class="home-container">

  <nav class="navbar">
    <h1 class="logo">Radiant Roots</h1>
    <div class="nav-right">
      <span class="welcome">Welcome, {{ email }}</span>
      <button class="btn-logout" (click)="logout()">Logout</button>
    </div>
  </nav>

     <div class="search-wrapper">
      <div class="search-container">
        <input type="text" class="search-input" placeholder="Search products..." [(ngModel)]="searchProduct">
        <button class="search-btn">🔍</button>
      </div>

      <div class="product-grid">
        <div class="product-card" *ngFor="let products of filteredProducts">
          <div class="product-icon">🧴</div>
          <h3>{{ products.name }}</h3>
          <p>{{ products.category }}</p>
          <span class="price">₹{{ products.price }}</span>
        </div>

        <div class="no-result" *ngIf="filteredProducts.length === 0">
          <p>No products found 😔</p>
        </div>
      </div>
    </div>

  <div class="content">
    <h2>Dashboard</h2>
    <p class="subtitle">What would you like to do?</p>

    <div class="action-grid">
      <div class="action-card"routerLink="(['/addproduct'])">
        <div class="action-icon">➕</div>
        <h3>Add New Product</h3>
        <p>Add a new item to your catalog</p>
      </div>

      <div class="action-card" routerLink="(['/orders'])">
        <div class="action-icon">📋</div>
        <h3>View Order List</h3>
        <p>Browse and manage all orders</p>
      </div>
    </div>

 
  </div>
</div>
