<h2>Add Product</h2>

<form [formGroup]="productForm" (ngSubmit)="onSubmit()">

  <input type="text" placeholder="Product ID" formControlName="id" />

  <input type="text" placeholder="Product Name" formControlName="name" />

  <input type="number" placeholder="Product Count" formControlName="count" />

  <label>Expiry Date:</label>
  <input type="date" formControlName="expiryDate" />

  <label>Skin Type:</label>
  <select formControlName="skinType">
    <option *ngFor="let type of skinTypes" [value]="type">{{ type }}</option>
  </select>

  <label>Gender:</label>
  <select formControlName="gender">
    <option *ngFor="let g of genders" [value]="g">{{ g }}</option>
  </select>

  <input type="number" placeholder="Age" formControlName="age" />

  <input type="number" placeholder="Price" formControlName="price" />

  <textarea placeholder="Description" formControlName="description"></textarea>

  <label>Date & Time:</label>
  <input type="datetime-local" formControlName="dateTime" />

  <br /><br />
  <button type="submit">Add Product</button>

</form>
